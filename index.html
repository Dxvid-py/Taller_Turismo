<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><title>Explora el Mundo</title>
    <style>
        body { font-family: 'Montserrat', sans-serif; margin: 0; background-color: #f0f2f5; }
        header { background: #2c3e50; color: white; padding: 40px; text-align: center; }
        .container { max-width: 1200px; margin: 20px auto; padding: 20px; }
        .destinos-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 230px; object-fit: cover; }
        .card-body { padding: 20px; }
        .ubicacion { color: #e67e22; font-weight: bold; display: block; margin-top: 10px; }
    </style>
</head>
<body>
    <header><h1>EXPLORA EL MUNDO</h1></header>
    <main class="container">
        <div class="destinos-grid">
            <div class="card"><img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34?w=600"><h2>París</h2></div>
            <div class="card"><img src="https://images.unsplash.com/photo-1587590227264-0ac64ce63ce8?w=600"><h2>Machu Picchu</h2></div>
            <div class="card"><img src="https://images.unsplash.com/photo-1552832230-c0197dd311b5?w=600"><h2>Roma</h2></div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?w=600" alt="Tokio">
                <div class="card-body">
                    <h2>Tokio, Japón</h2>
                    <p>Una metrópolis que mezcla rascacielos futuristas con templos históricos y una cultura tecnológica única.</p>
                    <span class="ubicacion">Ubicación: Isla de Honshu, Asia</span>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
