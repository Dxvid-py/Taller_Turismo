<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explora el Mundo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Oswald:wght@500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; margin: 0; background-color: #f0f2f5; }
        header { background: #2c3e50; color: white; padding: 40px; text-align: center; }
        .container { max-width: 1200px; margin: 20px auto; padding: 20px; }
        .destinos-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        /* EFECTO HOVER AÑADIDO */
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: transform 0.4s ease, box-shadow 0.4s ease; cursor: pointer; }
        .card:hover { transform: translateY(-12px); box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .card img { width: 100%; height: 230px; object-fit: cover; }
        .card-body { padding: 20px; }
        .ubicacion { color: #e67e22; font-weight: bold; display: block; margin-top: 10px; }
    </style>
</head>
<body>
    <header><h1>EXPLORA EL MUNDO</h1></header>
    <main class="container">
        <div class="destinos-grid">
            <div class="card"><h2>París</h2></div><div class="card"><h2>Machu Picchu</h2></div><div class="card"><h2>Roma</h2></div><div class="card"><h2>Tokio</h2></div><div class="card"><h2>Cartagena</h2></div><div class="card"><h2>Nueva York</h2></div><div class="card"><h2>El Cairo</h2></div><div class="card"><h2>Venecia</h2></div><div class="card"><h2>Sídney</h2></div><div class="card"><h2>Cancún</h2></div>
        </div>
    </main>
</body>
</html>
