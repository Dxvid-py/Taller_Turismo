<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Explora el Mundo</title>
    <style>
        body { font-family: 'Montserrat', sans-serif; margin: 0; background-color: #f0f2f5; }
        header { background: #2c3e50; color: white; padding: 40px; text-align: center; }
        .container { max-width: 1200px; margin: 20px auto; padding: 20px; }
        .destinos-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s; }
        .card img { width: 100%; height: 230px; object-fit: cover; }
        .card-body { padding: 20px; }
        .card-body h2 { color: #2c3e50; margin-top: 0; font-size: 1.4rem; }
        .card-body p { font-size: 0.9rem; line-height: 1.5; color: #555; }
        .ubicacion { color: #e67e22; font-weight: bold; font-size: 0.85rem; display: block; margin-top: 10px; }
    </style>
</head>
<body>
    <header><h1>EXPLORA EL MUNDO</h1></header>
    <div class="container"><div class="destinos-grid"></div></div>
</body>
</html>
