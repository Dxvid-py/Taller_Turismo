<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explora el Mundo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Oswald:wght@500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; margin: 0; background-color: #f0f2f5; }
        header { background: #2c3e50; color: white; padding: 40px; text-align: center; }
        .container { max-width: 1200px; margin: 20px auto; padding: 20px; }
        .destinos-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 230px; object-fit: cover; }
        .card-body { padding: 20px; }
        .ubicacion { color: #e67e22; font-weight: bold; display: block; margin-top: 10px; }
    </style>
</head>
<body>
    <header><h1>EXPLORA EL MUNDO</h1></header>
    <main class="container">
        <div class="destinos-grid">
            <div class="card"><img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34?w=600"> <div class="card-body"><h2>París</h2><p>Ciudad de la luz.</p></div></div>
            <div class="card"><img src="https://images.unsplash.com/photo-1587590227264-0ac64ce63ce8?w=600"> <div class="card-body"><h2>Machu Picchu</h2><p>Ciudad Inca.</p></div></div>
            <div class="card"><img src="https://images.unsplash.com/photo-1552832230-c0197dd311b5?w=600"> <div class="card-body"><h2>Roma</h2><p>Historia imperial.</p></div></div>
            <div class="card"><img src="https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?w=600"> <div class="card-body"><h2>Tokio</h2><p>Metrópolis futurista.</p></div></div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1583531352515-888413146a51?w=600" alt="Cartagena">
                <div class="card-body">
                    <h2>Cartagena, Colombia</h2>
                    <p>Ciudad amurallada con arquitectura colonial, rica en historia y leyendas en la costa del Caribe.</p>
                    <span class="ubicacion">Ubicación: Caribe, Sudamérica</span>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
